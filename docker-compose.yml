services:
  backend:
    build:
      context: ./backend
      args:
        BUILD_VERSION: "1.0.0"
        BUILD_COMMIT: "b8cfd46"
    env_file:
      - .env
    environment:
      - APP_VERSION=1.0.0
      - GIT_COMMIT=b8cfd46
    volumes:
      - pfadi_data:/app/data
    networks:
      - default
      - npm_network
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      - PORT=3000
      - HOST=0.0.0.0
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - default
      - npm_network
    restart: unless-stopped

volumes:
  pfadi_data:

networks:
  default:
  npm_network:
    external: true
    name: nginx-proxy-manager_default
